name: Release

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag, e.g. v25.1 or 25.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and release
    runs-on: ubuntu-latest

    steps:
      - name: Resolve tag
        id: release
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          VERSION="${TAG#v}"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check out repository
        uses: actions/checkout@v5
        with:
          ref: ${{ steps.release.outputs.tag }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: false

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync --all-groups

      - name: Check package version matches tag
        shell: bash
        run: |
          PROJECT_VERSION="$(uv run python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          TAG_VERSION="${{ steps.release.outputs.version }}"

          echo "pyproject.toml version: $PROJECT_VERSION"
          echo "release tag version:    $TAG_VERSION"

          if [ "$PROJECT_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: pyproject.toml has $PROJECT_VERSION but tag is $TAG_VERSION"
            exit 1
          fi

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build wheel
        run: uv build --wheel

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.release.outputs.tag }}" \
            --title "${{ steps.release.outputs.tag }}" \
            --notes "Release ${{ steps.release.outputs.tag }}" \
            dist/*.whl