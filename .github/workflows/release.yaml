name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    name: Build wheel and create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Check tag matches project version
        shell: bash
        run: |
          project_version="$(python -c 'import tomllib; from pathlib import Path; print(tomllib.load(Path("pyproject.toml").open("rb"))["project"]["version"])')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$project_version" ]]; then
            echo "Tag '$GITHUB_REF_NAME' does not match pyproject.toml version '$project_version'."
            echo "Use tag '$project_version' or 'v$project_version'."
            exit 1
          fi

      - name: Lint
        run: uv run ruff check sphinx_test_spec tests

      - name: Test
        run: uv run python -m pytest -n auto tests/

      - name: Build wheel
        run: uv build --wheel

      - name: Create GitHub Release and upload wheel
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$TAG_NAME" dist/*.whl \
            --title "$TAG_NAME" \
            --generate-notes
